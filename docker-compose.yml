services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tawny_soc
      POSTGRES_USER: tawny_soc
      POSTGRES_PASSWORD: tawny_soc
    ports:
      - "5434:5432"
    volumes:
      - tawny_soc_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tawny_soc -d tawny_soc"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tawny_soc:tawny_soc@db:5432/tawny_soc
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-change-me-change-me-change-me}
      BETTER_AUTH_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      TAWNY_SOC_INGEST_TOKEN: ${TAWNY_SOC_INGEST_TOKEN:-}
      NODE_ENV: production
    ports:
      - "3001:3001"
    command: sh -c "pnpm db:migrate && pnpm start"

volumes:
  tawny_soc_pg:
